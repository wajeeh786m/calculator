<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lumen — A Premium Calculator</title>
  <meta name="description" content="Lumen is a premium glassmorphic calculator built with vanilla HTML, CSS, and JavaScript. Fast, accessible, and beautifully animated." />
  <meta name="theme-color" content="#05070D" />

  <!-- Preconnect / Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="dark">

  <!-- ================= AMBIENT BACKGROUND ================= -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__orb ambient__orb--one"></div>
    <div class="ambient__orb ambient__orb--two"></div>
    <div class="ambient__orb ambient__orb--three"></div>
    <div class="ambient__grain"></div>
  </div>

  <!-- ================= APP SHELL ================= -->
  <div class="app" id="app">

    <!-- ============ TOP BAR ============ -->
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L14.2 9.2L21 12L14.2 14.8L12 22L9.8 14.8L3 12L9.8 9.2L12 2Z" fill="url(#lumenGrad)"/>
            <defs>
              <linearGradient id="lumenGrad" x1="3" y1="2" x2="21" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4F8CFF"/>
                <stop offset="1" stop-color="#00D4FF"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="topbar__name">Lumen</span>
      </div>

      <div class="topbar__actions">
        <button type="button" class="icon-btn" id="soundToggle" aria-pressed="true" aria-label="Toggle button sounds">
          <svg class="icon icon--sound-on" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="4 9 8 9 12 5 12 19 8 15 4 15 4 9"></polygon>
            <path d="M16.5 8.5a5 5 0 0 1 0 7"></path>
            <path d="M19 6a9 9 0 0 1 0 12"></path>
          </svg>
          <svg class="icon icon--sound-off" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="4 9 8 9 12 5 12 19 8 15 4 15 4 9"></polygon>
            <line x1="17" y1="9" x2="22" y2="14"></line>
            <line x1="22" y1="9" x2="17" y2="14"></line>
          </svg>
        </button>

        <button type="button" class="icon-btn" id="themeToggle" aria-pressed="false" aria-label="Toggle light and dark theme">
          <svg class="icon icon--moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg class="icon icon--sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <line x1="12" y1="1.5" x2="12" y2="3.5"></line>
            <line x1="12" y1="20.5" x2="12" y2="22.5"></line>
            <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"></line>
            <line x1="18.4" y1="18.4" x2="19.8" y2="19.8"></line>
            <line x1="1.5" y1="12" x2="3.5" y2="12"></line>
            <line x1="20.5" y1="12" x2="22.5" y2="12"></line>
            <line x1="4.2" y1="19.8" x2="5.6" y2="18.4"></line>
            <line x1="18.4" y1="5.6" x2="19.8" y2="4.2"></line>
          </svg>
        </button>

        <button type="button" class="icon-btn" id="historyToggle" aria-pressed="false" aria-expanded="false" aria-controls="historyPanel" aria-label="Toggle calculation history">
          <svg class="icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"></path>
            <path d="M3 4v5h5"></path>
            <path d="M12 7v5l3.5 2"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- ============ MAIN LAYOUT ============ -->
    <main class="stage">

      <!-- ============ CALCULATOR ============ -->
      <section class="calculator" id="calculator" aria-label="Calculator">

        <!-- Display -->
        <div class="display" id="display">
          <div class="display__expression" id="expression" aria-hidden="true">&nbsp;</div>
          <div class="display__result-row">
            <span class="display__result" id="result" role="status" aria-live="polite" aria-atomic="true">0</span>
            <button type="button" class="copy-btn" id="copyBtn" aria-label="Copy result to clipboard">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="9" y="9" width="12" height="12" rx="2"></rect>
                <path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"></path>
              </svg>
              <span class="copy-btn__tip" id="copyTip">Copied</span>
            </button>
          </div>
        </div>

        <!-- Button Grid -->
        <div class="keypad" id="keypad" role="group" aria-label="Calculator keys">

          <button type="button" class="key key--fn key--danger" data-action="clear" aria-label="All clear">AC</button>
          <button type="button" class="key key--fn" data-action="delete" aria-label="Delete last digit">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
              <line x1="18" y1="9" x2="12" y2="15"></line>
              <line x1="12" y1="9" x2="18" y2="15"></line>
            </svg>
          </button>
          <button type="button" class="key key--fn" data-action="percent" aria-label="Percent">%</button>
          <button type="button" class="key key--op" data-action="divide" aria-label="Divide">&divide;</button>

          <button type="button" class="key key--num" data-num="7">7</button>
          <button type="button" class="key key--num" data-num="8">8</button>
          <button type="button" class="key key--num" data-num="9">9</button>
          <button type="button" class="key key--op" data-action="multiply" aria-label="Multiply">&times;</button>

          <button type="button" class="key key--num" data-num="4">4</button>
          <button type="button" class="key key--num" data-num="5">5</button>
          <button type="button" class="key key--num" data-num="6">6</button>
          <button type="button" class="key key--op" data-action="subtract" aria-label="Subtract">&minus;</button>

          <button type="button" class="key key--num" data-num="1">1</button>
          <button type="button" class="key key--num" data-num="2">2</button>
          <button type="button" class="key key--num" data-num="3">3</button>
          <button type="button" class="key key--op" data-action="add" aria-label="Add">+</button>

          <button type="button" class="key key--fn" data-action="sign" aria-label="Toggle positive or negative">&plusmn;</button>
          <button type="button" class="key key--num" data-num="0">0</button>
          <button type="button" class="key key--num" data-action="decimal" aria-label="Decimal point">.</button>
          <button type="button" class="key key--equals" data-action="equals" aria-label="Equals">=</button>

        </div>
      </section>

      <!-- ============ HISTORY PANEL ============ -->
      <aside class="history" id="historyPanel" aria-label="Calculation history" data-open="false">
        <div class="history__head">
          <h2 class="history__title">History</h2>
          <button type="button" class="history__clear" id="clearHistory" aria-label="Clear all history">Clear</button>
        </div>
        <ol class="history__list" id="historyList">
          <!-- History items injected by JS -->
        </ol>
        <div class="history__empty" id="historyEmpty">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"></path>
            <path d="M3 4v5h5"></path>
            <path d="M12 7v5l3.5 2"></path>
          </svg>
          <p>Your calculations will appear here</p>
        </div>
      </aside>

    </main>

    <footer class="footer">
      <p>Built with HTML, CSS &amp; JavaScript &mdash; no frameworks.</p>
    </footer>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
